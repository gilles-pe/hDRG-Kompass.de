<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      (function () {
        var l = window.location;
        var path = l.pathname.slice(1).replace(/&/g, '~and~');
        var search = l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '';
        l.replace(l.protocol + '//' + l.host + '/?/' + path + search + l.hash);
      })();
    </script>
  </head>
  <body></body>
</html>
